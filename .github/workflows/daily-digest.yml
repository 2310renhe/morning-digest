name: Daily Digest

on:
  schedule:
    - cron: '0 13 * * *'   # 6AM PDT (UTC-7). Change to '0 14 * * *' Nov-Mar for PST.
  workflow_dispatch:        # Allows manual run from GitHub Actions tab

permissions:
  contents: write           # Needed to commit index.html back to the repo

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python daily_digest.py

      - name: Commit and push digest
        run: |
          git config user.name  "Morning Digest Bot"
          git config user.email "action@github.com"
          git add index.html archive/ state.json
          git diff --staged --quiet || git commit -m "Daily digest $(date +%Y-%m-%d)"
          git push
